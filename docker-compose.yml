services:
  mysql:
    image: mysql:8.4
    container_name: lucky-star-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - lucky_mysql80_data:/var/lib/mysql
      - ./database/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/mysql/seed_test_data.sql:/docker-entrypoint-initdb.d/seed_test_data.sql
    networks:
      - lucky-network

  postgres:
    image: postgres:16
    container_name: lucky-star-postgres
    restart: always
    # T-090 壓測後調高：預設 max_connections=100，各服務池加大後（wallet 32 + game 24
    # + rank 10 + admin 5 = 71）留足 headroom，避免尖峰撞上限反而取不到連線。
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - lucky_postgres_data:/var/lib/postgresql/data
      - ./database/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/postgres/seed_test_data.sql:/docker-entrypoint-initdb.d/seed_test_data.sql
    networks:
      - lucky-network

  redis:
    image: redis:7
    container_name: lucky-star-redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lucky-network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: lucky-star-kafka
    restart: always
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      # ── KRaft 模式（無 Zookeeper）：broker + controller 合一單節點 ──
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@lucky-star-kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # 固定 cluster id，避免每次重建 volume 後 id 不一致導致啟動失敗
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://lucky-star-kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - lucky_kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - lucky-network

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: lucky-star-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka/kafka-init.sh:/kafka-init.sh:ro
    command: ["bash", "/kafka-init.sh"]
    networks:
      - lucky-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: lucky-star-kafka-ui
    restart: always
    depends_on:
      - kafka
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-lucky-star
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: lucky-star-kafka:29092
    networks:
      - lucky-network

  # ── 後端服務（全部容器化，docker compose up -d 一次啟動，取代各自 mvn spring-boot:run 開視窗）──
  member-service:
    build:
      context: .
      dockerfile: backend/member-service/Dockerfile
    container_name: lucky-star-member-service
    restart: always
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: lucky-star-kafka:29092
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRY_MS: ${JWT_ACCESS_TOKEN_EXPIRY_MS}
      JWT_REFRESH_TOKEN_EXPIRY_MS: ${JWT_REFRESH_TOKEN_EXPIRY_MS}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP}
      LOG_LEVEL_SQL: ${LOG_LEVEL_SQL}
      LOG_LEVEL_SECURITY: ${LOG_LEVEL_SECURITY}
    ports:
      - "${MEMBER_SERVICE_PORT}:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lucky-network

  wallet-service:
    build:
      context: .
      dockerfile: backend/wallet-service/Dockerfile
    container_name: lucky-star-wallet-service
    restart: always
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: lucky-star-kafka:29092
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP}
      LOG_LEVEL_SQL: ${LOG_LEVEL_SQL}
    ports:
      - "${WALLET_SERVICE_PORT}:8082"
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lucky-network

  game-service:
    build:
      context: .
      dockerfile: backend/game-service/Dockerfile
    container_name: lucky-star-game-service
    restart: always
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: lucky-star-kafka:29092
      WALLET_SERVICE_URL: http://wallet-service:8082
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP}
      LOG_LEVEL_SQL: ${LOG_LEVEL_SQL}
    ports:
      - "${GAME_SERVICE_PORT}:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      wallet-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lucky-network

  rank-service:
    build:
      context: .
      dockerfile: backend/rank-service/Dockerfile
    container_name: lucky-star-rank-service
    restart: always
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: lucky-star-kafka:29092
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP}
      LOG_LEVEL_SQL: ${LOG_LEVEL_SQL}
    ports:
      - "${RANK_SERVICE_PORT}:8084"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lucky-network

  admin-service:
    build:
      context: .
      dockerfile: backend/admin-service/Dockerfile
    container_name: lucky-star-admin-service
    restart: always
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: lucky-star-kafka:29092
      MEMBER_SERVICE_URL: http://member-service:8081
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_JWT_EXPIRY_MS: ${ADMIN_JWT_EXPIRY_MS}
      ADMIN_SEED_ENABLED: ${ADMIN_SEED_ENABLED}
      ADMIN_SEED_USERNAME: ${ADMIN_SEED_USERNAME}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP}
      LOG_LEVEL_SQL: ${LOG_LEVEL_SQL}
    ports:
      - "${ADMIN_SERVICE_PORT}:8086"
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      member-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lucky-network

  notification-service:
    build:
      context: .
      dockerfile: backend/notification-service/Dockerfile
    container_name: lucky-star-notification-service
    restart: always
    environment:
      KAFKA_BOOTSTRAP_SERVERS: lucky-star-kafka:29092
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP}
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:8087"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lucky-network

  gateway-service:
    build:
      context: .
      dockerfile: backend/gateway-service/Dockerfile
    container_name: lucky-star-gateway-service
    restart: always
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      MEMBER_SERVICE_URL: http://member-service:8081
      WALLET_SERVICE_URL: http://wallet-service:8082
      GAME_SERVICE_URL: http://game-service:8083
      RANK_SERVICE_URL: http://rank-service:8084
      ADMIN_SERVICE_URL: http://admin-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      LOG_LEVEL_APP: ${LOG_LEVEL_APP}
      LOG_LEVEL_GATEWAY: ${LOG_LEVEL_GATEWAY}
      LOG_LEVEL_SECURITY: ${LOG_LEVEL_SECURITY}
    ports:
      - "${GATEWAY_PORT}:8080"
    depends_on:
      redis:
        condition: service_healthy
      member-service:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
      game-service:
        condition: service_healthy
      rank-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lucky-network

  # ── 觀測性（選配）：docker compose --profile observability up -d 才會啟動 ──
  # 後端服務已容器化改用 host.docker.internal 的 target 仍可運作（同網路可雙向解析）；
  # scrape 目標改為容器服務名屬後續優化，非本次阻斷項，見 observability/prometheus.yml 註解
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: lucky-star-prometheus
    restart: always
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - lucky_prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lucky-network

  grafana:
    image: grafana/grafana:11.1.0
    container_name: lucky-star-grafana
    restart: always
    profiles: ["observability"]
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      # 本機觀測用，免登入直接匿名 Admin（無真實金流專案、不對外）
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - lucky_grafana_data:/var/lib/grafana
    networks:
      - lucky-network

volumes:
  lucky_mysql80_data:
  lucky_postgres_data:
  lucky_kafka_data:
  lucky_prometheus_data:
  lucky_grafana_data:

networks:
  lucky-network:
    driver: bridge
