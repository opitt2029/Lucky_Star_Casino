# Prometheus scrape 設定（T-090 觀測性）
# 現行拓撲：後端 7 服務跑在宿主機（mvn spring-boot:run），Prometheus 在容器內，
# 故 target 用 host.docker.internal（compose 已加 extra_hosts 對 Linux 相容）。
# 若日後改用全容器化拓撲（docker-compose.app.yml），target 改為 compose 服務名。
global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: lucky-star-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels: { service: gateway-service }
      - targets: ["host.docker.internal:8081"]
        labels: { service: member-service }
      - targets: ["host.docker.internal:8082"]
        labels: { service: wallet-service }
      - targets: ["host.docker.internal:8083"]
        labels: { service: game-service }
      - targets: ["host.docker.internal:8084"]
        labels: { service: rank-service }
      - targets: ["host.docker.internal:8086"]
        labels: { service: admin-service }
      - targets: ["host.docker.internal:8087"]
        labels: { service: notification-service }
