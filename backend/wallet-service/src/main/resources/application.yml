server:
  port: 8082
  tomcat:
    mbeanregistry:
      # 開啟 Tomcat MBean 才會暴露 tomcat_threads_busy/current 指標（否則 /actuator/prometheus
      # 只有 tomcat_sessions_*，看不到執行緒池飽和）。壓測診斷前提，執行期開銷可忽略。（T-090 觀測補齊）
      enabled: true

spring:
  config:
    import: optional:file:../../.env[.properties]
  application:
    name: wallet-service

  # ================================================================
  # 雙資料庫設定（ADR-001：CQRS 讀寫分離）
  # 注意：雙 DataSource 需要自訂 DataSourceConfig.java
  #       Spring Boot JPA 自動配置僅支援單一資料源
  #       wallet-service 啟動時會使用下方 postgres 設定作為 @Primary
  # ================================================================

  # PostgreSQL — 帳務寫庫（@Primary DataSource）
  # wallets、wallet_transactions（寫端）
  datasource:
    jdbc-url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:lucky_star_casino}
    username: ${POSTGRES_USER:lucky_user}
    password: ${POSTGRES_PASSWORD:lucky_password}
    driver-class-name: org.postgresql.Driver
    # T-090 壓測（2026-07-21）：帳務寫庫熱路徑，每 spin 兩筆寫入（debit+credit），
    # 尖峰滿載、排隊 18、取連線最長 1.12s。首輪 15→32；2026-07-22 依 CPU 僅 ~40%（硬體有餘裕）
    # 再上調 32→40，與 game 對齊。Postgres 預算：game 40 + wallet 40 + rank 10 + admin 5 = 95 < 200。
    maximum-pool-size: 40
    minimum-idle: 10
    connection-timeout: 30000

  # 注意：spring.jpa.* 在此服務無效 —— EntityManagerFactory 由 DataSourceConfig.java
  # 手動建立（雙 EMF 不能用 Spring Boot 預設自動配置）。
  # JPA_DDL_AUTO 環境變數會被讀進 postgresEntityManagerFactory，預設 validate。

  # MySQL — CQRS 讀端 DataSource（DataSourceConfig.mysqlDataSource 綁定此前綴）
  datasource-mysql:
    jdbc-url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:lucky_star_casino}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei&characterEncoding=UTF-8
    username: ${MYSQL_USER:lucky_user}
    password: ${MYSQL_PASSWORD:lucky_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    maximum-pool-size: 10
    minimum-idle: 2
    connection-timeout: 30000

  # Redis — 贈幣當日累計、破產補助當日狀態（TTL 到午夜）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
    consumer:
      group-id: wallet-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

management:
  metrics:
    distribution:
      percentiles-histogram:
        # P99 直方圖（T-090 觀測性）：供 Prometheus histogram_quantile 計算延遲分位數
        "[http.server.requests]": true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

internal:
  secret: ${INTERNAL_SECRET:?INTERNAL_SECRET environment variable is required}

# Transactional Outbox（藍圖 04 P2）：WalletOutboxPoller 背景投遞器參數。
# poll-interval-ms：輪詢間隔（毫秒），比 member 的 5000ms 短——排行榜/通知體感延遲要求較高。
#   T-090 遠端壓測（2026-07-23）後由 1000ms 下修為 200ms：搭配下方可調批次與平行 ack，
#   把投遞上限從舊版 ~100 events/s 拉高到 ~batch/interval（500/0.2s ≈ 2,500 events/s）。
# batch-size：單輪最多撈幾筆待送事件（舊版寫死 100，是壓測下的吞吐瓶頸）。拉大增吞吐但單輪
#   交易變大、持列較久，需與 DB 負載權衡。
wallet:
  outbox:
    poll-interval-ms: ${WALLET_OUTBOX_POLL_INTERVAL_MS:200}
    batch-size: ${WALLET_OUTBOX_BATCH_SIZE:500}

# 鑽石測試帳號：列入清單者視為「無限鑽石」，鑽石換星幣不檢查餘額也不實際扣款（僅供測試/展示）
# 1172=tadge003、1175=weiyu10366。可由 DIAMOND_UNLIMITED_PLAYER_IDS 逗號分隔覆寫
diamond:
  unlimited-player-ids: ${DIAMOND_UNLIMITED_PLAYER_IDS:1172,1175}

logging:
  level:
    com.luckystar.wallet: ${LOG_LEVEL_APP:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:OFF}
