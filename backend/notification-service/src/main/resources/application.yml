server:
  port: 8087

spring:
  config:
    import: optional:file:../../.env[.properties]
  application:
    name: notification-service

  # 本服務無資料庫（純事件→WebSocket 橋接），不引入 JPA/DataSource。

  # Kafka — 消費 notification.push（T-071）、game.result（T-072）
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
    consumer:
      group-id: notification-service-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
    listener:
      # 手動 ack：listener 內自行 try/catch，壞訊息記錄後照樣 ack（drop），不卡住 consumer（T-071）
      ack-mode: MANUAL_IMMEDIATE

# STOMP CONNECT 連線鑑權：與 member-service 共用同一把 jwt.secret（玩家 access token）。
# 缺值即啟動失敗（無預設，比照 member/gateway，見 AGENTS.md §地雷 2）。
jwt:
  secret: ${JWT_SECRET:?JWT_SECRET environment variable is required}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.luckystar.notification: ${LOG_LEVEL_APP:INFO}
