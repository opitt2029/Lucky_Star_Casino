server:
  port: 8081

spring:
  config:
    import: optional:file:../../.env[.properties]
  application:
    name: member-service

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:lucky_star_casino}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei&characterEncoding=UTF-8
    username: ${MYSQL_USER:lucky_user}
    password: ${MYSQL_PASSWORD:lucky_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # T-090 壓測（2026-07-21）：此池尖峰滿載、排隊 15。10→16 紓解。
      # 走 MySQL（max_connections 預設 151），與 Postgres 預算無關。
      maximum-pool-size: 16
      minimum-idle: 4
      connection-timeout: 30000
      # DB 慢開機韌性：開機時若連不到 MySQL，HikariCP 會重試取得首條連線最多 60s，
      # 而非立即崩潰退出（避免 docker 剛起、MySQL 尚未 healthy 就啟動 → 整個服務掛掉）。
      initialization-fail-timeout: ${DB_INIT_FAIL_TIMEOUT:60000}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
      acks: all                      # 等所有 in-sync replica 落盤才算成功（金流事件不可遺失）
      properties:
        enable.idempotence: true     # broker 端去重，避免 retry 造成重複訊息
    consumer:
      group-id: member-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

  security:
    user:
      name: disabled

jwt:
  secret: ${JWT_SECRET:?JWT_SECRET environment variable is required}
  access-token-expiry-ms: ${JWT_ACCESS_TOKEN_EXPIRY_MS:900000}
  refresh-token-expiry-ms: ${JWT_REFRESH_TOKEN_EXPIRY_MS:604800000}

management:
  metrics:
    distribution:
      percentiles-histogram:
        # P99 直方圖（T-090 觀測性）：供 Prometheus histogram_quantile 計算延遲分位數
        "[http.server.requests]": true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.luckystar.member: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:OFF}

internal:
  secret: ${INTERNAL_SECRET:?INTERNAL_SECRET environment variable is required}

outbox:
  poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:5000}   # OutboxPoller 輪詢間隔（毫秒）
