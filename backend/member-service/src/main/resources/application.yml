server:
  port: 8081
  tomcat:
    mbeanregistry:
      # 開啟 Tomcat MBean 才會暴露 tomcat_threads_busy/current 指標（否則 /actuator/prometheus
      # 只有 tomcat_sessions_*，看不到執行緒池飽和）。壓測診斷前提，執行期開銷可忽略。（T-090 觀測補齊）
      enabled: true

spring:
  config:
    import: optional:file:../../.env[.properties]
  application:
    name: member-service

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:lucky_star_casino}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei&characterEncoding=UTF-8
    username: ${MYSQL_USER:lucky_user}
    password: ${MYSQL_PASSWORD:lucky_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # T-090 壓測（2026-07-21）：此池尖峰滿載、排隊 15。首輪 10→16；2026-07-22 依 CPU 僅 ~40%
      # （硬體有餘裕）再上調 16→40，與 game/wallet 對齊到 40。
      # 走 MySQL（max_connections 預設 151，40 遠低於此），與 Postgres 200 預算無關。
      maximum-pool-size: 40
      minimum-idle: 10
      connection-timeout: 30000
      # DB 慢開機韌性：開機時若連不到 MySQL，HikariCP 會重試取得首條連線最多 60s，
      # 而非立即崩潰退出（避免 docker 剛起、MySQL 尚未 healthy 就啟動 → 整個服務掛掉）。
      initialization-fail-timeout: ${DB_INIT_FAIL_TIMEOUT:60000}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
      acks: all                      # 等所有 in-sync replica 落盤才算成功（金流事件不可遺失）
      properties:
        enable.idempotence: true     # broker 端去重，避免 retry 造成重複訊息
    consumer:
      group-id: member-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

  security:
    user:
      name: disabled
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:oauth-not-configured}
            client-secret: ${GOOGLE_CLIENT_SECRET:oauth-not-configured}
            scope:
              - openid
              - profile
              - email
            redirect-uri: ${OAUTH_PUBLIC_BASE_URL:http://localhost:8080}/api/v1/auth/oauth2/callback/{registrationId}
          line:
            provider: line
            client-id: ${LINE_CHANNEL_ID:oauth-not-configured}
            client-secret: ${LINE_CHANNEL_SECRET:oauth-not-configured}
            client-name: LINE
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - openid
              - profile
            redirect-uri: ${OAUTH_PUBLIC_BASE_URL:http://localhost:8080}/api/v1/auth/oauth2/callback/{registrationId}
          apple:
            provider: apple
            client-id: ${APPLE_CLIENT_ID:oauth-not-configured}
            client-secret: ${APPLE_CLIENT_SECRET:oauth-not-configured}
            client-name: Apple
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            # 只要求 OIDC subject；若要求 name/email，Apple 會改用 form_post，
            # 正式 HTTPS 部署需另將 session cookie 設為 SameSite=None + Secure。
            scope:
              - openid
            redirect-uri: ${APPLE_REDIRECT_URI:http://localhost:8080/api/v1/auth/oauth2/callback/apple}
        provider:
          line:
            authorization-uri: https://access.line.me/oauth2/v2.1/authorize
            token-uri: https://api.line.me/oauth2/v2.1/token
            user-info-uri: https://api.line.me/oauth2/v2.1/userinfo
            jwk-set-uri: https://api.line.me/oauth2/v2.1/certs
            user-name-attribute: sub
          apple:
            authorization-uri: https://appleid.apple.com/auth/authorize
            token-uri: https://appleid.apple.com/auth/token
            jwk-set-uri: https://appleid.apple.com/auth/keys
            user-name-attribute: sub

jwt:
  secret: ${JWT_SECRET:?JWT_SECRET environment variable is required}
  access-token-expiry-ms: ${JWT_ACCESS_TOKEN_EXPIRY_MS:900000}
  refresh-token-expiry-ms: ${JWT_REFRESH_TOKEN_EXPIRY_MS:604800000}

management:
  metrics:
    distribution:
      percentiles-histogram:
        # P99 直方圖（T-090 觀測性）：供 Prometheus histogram_quantile 計算延遲分位數
        "[http.server.requests]": true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.luckystar.member: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:OFF}

internal:
  secret: ${INTERNAL_SECRET:?INTERNAL_SECRET environment variable is required}

outbox:
  poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:5000}   # OutboxPoller 輪詢間隔（毫秒）

social-oauth:
  frontend-base-url: ${OAUTH_FRONTEND_BASE_URL:http://localhost:5173}
  binding-ticket-ttl: 5m
  login-ticket-ttl: 2m
  providers:
    google:
      enabled: ${GOOGLE_OAUTH_ENABLED:false}
    line:
      enabled: ${LINE_OAUTH_ENABLED:false}
    apple:
      enabled: ${APPLE_OAUTH_ENABLED:false}
