server:
  port: 8080

spring:
  config:
    import: optional:file:../../.env[.properties]
  application:
    name: gateway-service

  # Redis Reactive — JWT 黑名單查詢、限流計數器
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  # Spring Cloud Gateway 路由設定（詳細路由規則待 T-003 補充）
  cloud:
    gateway:
      # ── HttpClient 連線池 ────────────────────────────────────────────────
      # 修正偶發「<service> service is temporarily unavailable」：reactor-netty 預設
      # 不驅逐閒置連線，會重用「下游 Tomcat 已關閉的 keep-alive 連線」，送出後收到
      # connection reset / PrematureCloseException → 觸發 CircuitBreaker fallback。
      # 對策：max-idle-time 必須 < 下游 Tomcat keepAliveTimeout（預設 20s），並開背景驅逐，
      # 讓 gateway 在下游關閉前就先淘汰閒置連線。
      httpclient:
        connect-timeout: 2000          # 建立 TCP 連線逾時（ms）
        response-timeout: 10s          # 等待下游回應逾時（需 > 熔斷 slow-call 3s 與冷啟動）
        pool:
          type: ELASTIC
          max-idle-time: 10s           # 閒置 > 10s 即驅逐（< 下游 keepAliveTimeout 20s）
          max-life-time: 5m            # 連線最長壽命，避免長壽連線累積異常
          eviction-interval: 30s       # 背景定期掃描驅逐過期連線
      # 全域 Retry：對「安全可重試」的情境自動重試一次，避免單一連線層瞬斷打到 fallback。
      # 僅限 GET（冪等）；POST（如註冊/登入）不重試，改由上方連線池設定根除瞬斷來源。
      default-filters:
        - name: Retry
          args:
            retries: 2
            methods: GET
            exceptions:
              - java.io.IOException
              - java.util.concurrent.TimeoutException
              - reactor.netty.http.client.PrematureCloseException
            backoff:
              firstBackoff: 50ms
              maxBackoff: 500ms
              factor: 2
              basedOnPreviousValue: false
      # 預設 CORS 設定，前端 localhost:5173 開發期間使用
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS environment variable is required}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-Requested-With
            allowCredentials: true
      routes:
        # ── Swagger / OpenAPI 文件聚合（T-092）──────────────────────────────
        # 各服務 /v3/api-docs 透過 gateway 代理出來，供聚合 Swagger UI（/swagger-ui.html）檢視。
        # 這些路徑已加入 jwt.whitelist，免 JWT；路徑與業務路由不重疊。
        - id: openapi-member
          uri: ${MEMBER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/v3/api-docs/member
          filters:
            - RewritePath=/v3/api-docs/member, /v3/api-docs
        - id: openapi-wallet
          uri: ${WALLET_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/v3/api-docs/wallet
          filters:
            - RewritePath=/v3/api-docs/wallet, /v3/api-docs
        - id: openapi-game
          uri: ${GAME_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/v3/api-docs/game
          filters:
            - RewritePath=/v3/api-docs/game, /v3/api-docs
        - id: openapi-rank
          uri: ${RANK_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/v3/api-docs/rank
          filters:
            - RewritePath=/v3/api-docs/rank, /v3/api-docs
        - id: openapi-admin
          uri: ${ADMIN_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/v3/api-docs/admin
          filters:
            - RewritePath=/v3/api-docs/admin, /v3/api-docs
        - id: openapi-notification
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/v3/api-docs/notification
          filters:
            - RewritePath=/v3/api-docs/notification, /v3/api-docs
        # 白名單路徑：免 JWT 驗證（登入/註冊）
        # 套用速率限制防暴力破解：5 req/sec replenish, burst 10
        - id: member-auth
          uri: ${MEMBER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${AUTH_RATE_LIMIT_REPLENISH:5}
                redis-rate-limiter.burstCapacity: ${AUTH_RATE_LIMIT_BURST:10}
                key-resolver: "#{@ipKeyResolver}"
            - name: CircuitBreaker
              args:
                name: member-service
                fallbackUri: forward:/fallback/member
        # 會員 API（需 JWT）
        - id: member-player
          uri: ${MEMBER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/player/**
          filters:
            - name: CircuitBreaker
              args:
                name: member-service
                fallbackUri: forward:/fallback/member
        # 好友 API（需 JWT）：端點實作在 member-service。
        - id: member-friends
          uri: ${MEMBER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/friends/**
          filters:
            - name: CircuitBreaker
              args:
                name: member-service
                fallbackUri: forward:/fallback/member
        # 每日簽到 + 簽到狀態/月度獎勵（需 JWT）：端點實作在 member-service，路徑落在 /api/v1/wallet 底下，
        # 必須排在下方 wallet 路由「之前」，否則會被 /api/v1/wallet/** 攔截轉發到 wallet-service。
        - id: member-checkin
          uri: ${MEMBER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/wallet/daily-checkin,/api/v1/wallet/checkin/**
          filters:
            - name: CircuitBreaker
              args:
                name: member-service
                fallbackUri: forward:/fallback/member
        # 錢包 API（需 JWT）
        - id: wallet
          uri: ${WALLET_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/wallet/**
          filters:
            - name: CircuitBreaker
              args:
                name: wallet-service
                fallbackUri: forward:/fallback/wallet
        # 遊戲 API（需 JWT）
        - id: game
          uri: ${GAME_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/game/**
          filters:
            - name: CircuitBreaker
              args:
                name: game-service
                fallbackUri: forward:/fallback/game
        # 排行榜 API（需 JWT）
        - id: rank
          uri: ${RANK_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/rank/**
          filters:
            - name: CircuitBreaker
              args:
                name: rank-service
                fallbackUri: forward:/fallback/rank
        # 管理介面（需 ADMIN role）
        - id: admin
          uri: ${ADMIN_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/admin/**
          filters:
            - name: CircuitBreaker
              args:
                name: admin-service
                fallbackUri: forward:/fallback/admin
        # 即時推播 WebSocket（STOMP over SockJS，T-070~T-072）：端點在 notification-service。
        # SockJS 交握含 /ws/info、/ws/{server}/{session}/{transport} 等子路徑，用 http:// URI 即可——
        # 帶 Upgrade header 的請求會被 RouteToRequestUrlFilter 自動把 scheme 轉成 ws，一般 SockJS
        # HTTP 交握（info/polling）仍走普通路由。JWT 驗證延後到 STOMP CONNECT 帧，由 notification-service
        # 的 StompAuthChannelInterceptor 處理（見 docs/architecture.md），故此路徑列入下方 JWT whitelist；
        # 長連線不套用 CircuitBreaker（熔斷後轉發 JSON fallback 對已升級的 WS 連線沒有意義）。
        - id: notification-ws
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/ws,/ws/**

# 每玩家限流設定（PlayerRateLimitGlobalFilter 使用）
rate-limit:
  player:
    replenish-rate: ${PLAYER_RATE_LIMIT_REPLENISH:10}
    burst-capacity: ${PLAYER_RATE_LIMIT_BURST:20}
  game:
    replenish-rate: ${GAME_RATE_LIMIT_REPLENISH:5}
    burst-capacity: ${GAME_RATE_LIMIT_BURST:10}

# Resilience4j Circuit Breaker instances — one per downstream service
resilience4j:
  circuitbreaker:
    instances:
      member-service:
        failure-rate-threshold: 50           # 失敗率 > 50% 觸發熔斷
        slow-call-rate-threshold: 80         # 慢呼叫率 > 80% 觸發熔斷
        slow-call-duration-threshold: 3s     # 超過 3s 視為慢呼叫
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10              # 最近 10 次請求統計
        minimum-number-of-calls: 5           # 至少 5 次後才開始評估
        wait-duration-in-open-state: 10s     # 熔斷後等 10s 進入 half-open
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      wallet-service:
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3s
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      game-service:
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3s
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      rank-service:
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3s
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      admin-service:
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3s
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

# JWT 設定 — secret 必須與 member-service 簽發端完全一致
jwt:
  secret: ${JWT_SECRET:?JWT_SECRET environment variable is required}
  # JwtAuthenticationGlobalFilter 跳過驗證的路徑前綴
  whitelist:
    - /api/v1/auth/
    - /actuator/health
    - /fallback/
    # Swagger / OpenAPI 文件（T-092）：免 JWT 才能開聚合文件頁與抓各服務 api-docs
    - /swagger-ui
    - /v3/api-docs
    - /webjars
    # WebSocket（T-070）：STOMP CONNECT 帧才帶 JWT，HTTP 層 SockJS 交握不帶 Authorization header
    - /ws
    # 後台（T-050）：admin JWT 用獨立 ADMIN_JWT_SECRET 簽發，gateway 的玩家 secret 驗不了它
    # （驗必失敗 401）。故 /admin/** 純轉發，認證/角色授權全由 admin-service 自身的
    # Spring Security（AdminJwtAuthFilter + @PreAuthorize）強制——該服務對未帶有效
    # ADMIN JWT 的請求一律 401/403，不依賴 gateway 守門。勿移除此項，否則後台整條路徑不通。
    - /admin/

# Swagger 聚合 UI（T-092）：gateway 本身無 REST API（停用自身 api-docs），
# 僅作為各下游服務文件的聚合入口。瀏覽 http://localhost:8080/swagger-ui.html，
# 右上下拉切換 member / wallet / game / rank / admin。
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: member-service
        url: /v3/api-docs/member
      - name: wallet-service
        url: /v3/api-docs/wallet
      - name: game-service
        url: /v3/api-docs/game
      - name: rank-service
        url: /v3/api-docs/rank
      - name: admin-service
        url: /v3/api-docs/admin
      - name: notification-service
        url: /v3/api-docs/notification

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.luckystar.gateway: ${LOG_LEVEL_APP:INFO}
    org.springframework.cloud.gateway: ${LOG_LEVEL_GATEWAY:INFO}
