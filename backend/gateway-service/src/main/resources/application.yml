server:
  port: 8080

spring:
  application:
    name: gateway-service

  # Redis Reactive — JWT 黑名單查詢、限流計數器
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # Spring Cloud Gateway 路由設定（詳細路由規則待 T-003 補充）
  cloud:
    gateway:
      # 預設 CORS 設定，前端 localhost:5173 開發期間使用
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # 白名單路徑：免 JWT 驗證（登入/註冊）
        - id: member-auth
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        # 會員 API（需 JWT）
        - id: member-player
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/player/**
        # 錢包 API（需 JWT）
        - id: wallet
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/wallet/**
        # 遊戲 API（需 JWT）
        - id: game
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/game/**
        # 排行榜 API（需 JWT）
        - id: rank
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/rank/**
        # 管理介面（需 ADMIN role）
        - id: admin
          uri: http://localhost:8086
          predicates:
            - Path=/admin/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.luckystar.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
