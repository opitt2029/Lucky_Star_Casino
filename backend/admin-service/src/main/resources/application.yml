server:
  port: 8086

spring:
  application:
    name: admin-service

  # ================================================================
  # 雙資料庫設定（ADR-001：MySQL 讀取各服務資料 + PostgreSQL 寫 admin_alerts）
  # 注意：雙 DataSource 需要自訂 DataSourceConfig.java
  # ================================================================

  # MySQL — 主要讀庫（@Primary DataSource）
  # 讀取 members、friendships 等各服務資料
  datasource:
    jdbc-url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:lucky_star_casino}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei&characterEncoding=UTF-8
    username: ${MYSQL_USER:lucky_user}
    password: ${MYSQL_PASSWORD:lucky_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # 注意：spring.jpa.* 在此服務無效 —— EntityManagerFactory 由 DataSourceConfig.java
  # 手動建立。MySQL EMF 固定 validate；Postgres EMF 讀 JPA_DDL_AUTO 環境變數（預設 validate）。

  # PostgreSQL — admin_alerts 寫入端 DataSource（DataSourceConfig.postgresDataSource 綁定此前綴）
  datasource-postgres:
    jdbc-url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:lucky_star_casino}
    username: ${POSTGRES_USER:lucky_user}
    password: ${POSTGRES_PASSWORD:lucky_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000

  # Redis：玩家停用使用者級封鎖標記（disabled:player:{id}）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
    consumer:
      group-id: admin-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.luckystar.admin: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:OFF}

# ================================================================
# 後台 JWT（T-050）：獨立 ADMIN_JWT_SECRET，與玩家 JWT_SECRET 分離。
# secret 無預設值 —— 缺了即啟動失敗（比照 JWT_SECRET/INTERNAL_SECRET 慣例）。
# ================================================================
admin:
  jwt:
    secret: ${ADMIN_JWT_SECRET}
    expiry-ms: ${ADMIN_JWT_EXPIRY_MS:3600000}   # 1 小時
  # 預設管理員播種（首次啟動建立可登入的 SUPER_ADMIN）
  seed:
    enabled: ${ADMIN_SEED_ENABLED:true}
    username: ${ADMIN_SEED_USERNAME:superadmin}
    password: ${ADMIN_SEED_PASSWORD:ChangeMe!SuperAdmin123}
