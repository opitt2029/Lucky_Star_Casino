server:
  port: 8083
  tomcat:
    mbeanregistry:
      # 開啟 Tomcat MBean 才會暴露 tomcat_threads_busy/current 指標（否則 /actuator/prometheus
      # 只有 tomcat_sessions_*，看不到執行緒池飽和）。壓測診斷前提，執行期開銷可忽略。（T-090 觀測補齊）
      enabled: true

spring:
  config:
    import: optional:file:../../.env[.properties]
  application:
    name: game-service

  # PostgreSQL（ADR-001：game_rounds、game_rtp_stats）
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:lucky_star_casino}
    username: ${POSTGRES_USER:lucky_user}
    password: ${POSTGRES_PASSWORD:lucky_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      # DB 慢開機韌性：開機時若連不到 PostgreSQL，HikariCP 會重試取得首條連線最多 60s，
      # 而非立即崩潰退出（避免 docker 剛起、Postgres 尚未 healthy 就啟動 → 整個服務掛掉）。
      initialization-fail-timeout: ${DB_INIT_FAIL_TIMEOUT:60000}

  jpa:
    hibernate:
      # Schema 由 database/postgres/init.sql 管理；預設 validate，本機開發可在 .env 設 JPA_DDL_AUTO=update
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # Redis — 遊戲 Session（Key: game:session:{playerId}:{roundId}，TTL 30 分鐘）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
    consumer:
      group-id: game-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

# 內部服務呼叫設定（Wallet Service 同步呼叫）— secret 必須由環境變數提供
internal:
  wallet-service:
    base-url: ${WALLET_SERVICE_URL:http://localhost:8082}
    secret: ${INTERNAL_SECRET:?INTERNAL_SECRET environment variable is required}

management:
  metrics:
    distribution:
      percentiles-histogram:
        # P99 直方圖（T-090 觀測性）：供 Prometheus histogram_quantile 計算延遲分位數
        "[http.server.requests]": true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

risk:
  player-win-limit: 50000    # 單玩家今日淨贏上限（星幣），超過即攔截
  rtp-sample-size: 500       # 計算全局 RTP 的近 N 局樣本數
  rtp-cache-refresh-ms: 2000 # 全局 RTP 快取排程間隔（Phase A1）：排程聚合寫 Redis，熱路徑只讀快取
  # 全局 RTP 上限（含本金口徑）— per-game：門檻須訂在「該遊戲結構性 RTP 之上」，
  # 風控才只在實際出現異常莊家虧損（玩家集體大贏）時觸發，而非每局正常派彩都誤判超限。
  # 結構性含本金 RTP 參考：老虎機 ≈ 0.94、百家樂 ≈ 0.99（+反水）、捕魚機設計 RTP 0.96（含殘血回收，ADR-004）。
  # 未列出的遊戲用 default。
  global-rtp-limit:
    default: 1.05
    # 老虎機：結構性 RTP ≈ 0.938，但含 70x/50x 三連重尾 → 單局倍率標準差 ≈ 2.4，
    # 500 局窗口 RTP 的標準差 ≈ 0.107。蒙地卡羅實測（500 萬局）：門檻 0.97 時約 36% 的
    # 檢查會「超限」、閉環下約 5.9% 贏局被強制改判 noWin（實得 RTP 被壓到 0.88）；
    # 0.99 幾乎沒改善（5.2%）。1.30 時誤觸降至 0.06% 贏局，仍足以攔截真異常
    # （賠付表 bug / 漏洞會讓窗口 RTP 持續遠超 1.3）。詳見 CHANGELOG 2026-07-06。
    SLOT: 1.30
    # 百家樂：結構性 RTP ≈ 0.99（＋返水 0.5~1% → 口徑內約 0.97~1.00，win_amount 含返水），
    # 500 局窗口 RTP 標準差 ≈ 0.04~0.06（押和 9x 比例越高越大）。蒙地卡羅實測（300 萬局，
    # 鏡像無限靴發牌/補牌表/攔截改判）：門檻 1.02 時 23~31% 的檢查誤判超限、閉環約 7% 的局
    # 被強制改判莊家贏（實得 RTP -1.3pt）；1.20 時誤觸 ≤0.08%（含押和偏多輪廓）仍可攔真異常。
    # 詳見 CHANGELOG 2026-07-06。
    BACCARAT: 1.20
    # 捕魚：設計 RTP 0.96（天花板），高變異（大魚捕獲單局 RTP 可遠超 1）→ 門檻留足裕度避免誤判超限。
    FISHING: 1.10

logging:
  level:
    com.luckystar.game: ${LOG_LEVEL_APP:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:OFF}
