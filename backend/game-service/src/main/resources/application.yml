server:
  port: 8083

spring:
  config:
    import: optional:file:../../.env[.properties]
  application:
    name: game-service

  # PostgreSQL（ADR-001：game_rounds、game_rtp_stats）
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:lucky_star_casino}
    username: ${POSTGRES_USER:lucky_user}
    password: ${POSTGRES_PASSWORD:lucky_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      # DB 慢開機韌性：開機時若連不到 PostgreSQL，HikariCP 會重試取得首條連線最多 60s，
      # 而非立即崩潰退出（避免 docker 剛起、Postgres 尚未 healthy 就啟動 → 整個服務掛掉）。
      initialization-fail-timeout: ${DB_INIT_FAIL_TIMEOUT:60000}

  jpa:
    hibernate:
      # Schema 由 database/postgres/init.sql 管理；預設 validate，本機開發可在 .env 設 JPA_DDL_AUTO=update
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # Redis — 遊戲 Session（Key: game:session:{playerId}:{roundId}，TTL 30 分鐘）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
    consumer:
      group-id: game-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

# 內部服務呼叫設定（Wallet Service 同步呼叫）— secret 必須由環境變數提供
internal:
  wallet-service:
    base-url: ${WALLET_SERVICE_URL:http://localhost:8082}
    secret: ${INTERNAL_SECRET:?INTERNAL_SECRET environment variable is required}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

risk:
  player-win-limit: 50000    # 單玩家今日淨贏上限（星幣），超過即攔截
  rtp-sample-size: 500       # 計算全局 RTP 的近 N 局樣本數
  # 全局 RTP 上限（含本金口徑）— per-game：門檻須訂在「該遊戲結構性 RTP 之上」，
  # 風控才只在實際出現異常莊家虧損（玩家集體大贏）時觸發，而非每局正常派彩都誤判超限。
  # 結構性含本金 RTP 參考：老虎機 ≈ 0.94、百家樂 ≈ 0.99（+反水）、捕魚機依數值。
  # 未列出的遊戲用 default。
  global-rtp-limit:
    default: 1.05
    SLOT: 0.97
    BACCARAT: 1.02
    FISHING: 1.00

logging:
  level:
    com.luckystar.game: ${LOG_LEVEL_APP:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:OFF}
