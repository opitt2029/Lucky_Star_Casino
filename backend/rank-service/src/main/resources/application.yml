server:
  port: 8084

spring:
  application:
    name: rank-service

  # PostgreSQL（ADR-001：rank_history、rank_daily_snapshots）
  datasource:
    url: jdbc:postgresql://localhost:5433/lucky_star_casino
    username: lucky_user
    password: lucky_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      # 開發期間用 update 自動建表；正式環境改 validate
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # Redis — rank:global:coins ZSet（全服榜）、rank:friend ZSet（好友榜）、今日贏幣王
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # Kafka
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
    consumer:
      group-id: rank-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.luckystar.rank: DEBUG
    org.hibernate.SQL: OFF
