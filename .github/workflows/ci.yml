# 這個 workflow 的名稱，會顯示在 GitHub 頁面上
name: CI

# 觸發條件：push 或 PR 到 main / develop 分支時自動執行
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1：基礎設施腳本測試（既有）
  # ---------------------------------------------------------------------------
  infra-test:
    name: 基礎設施測試
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 安裝 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 執行基礎設施測試
        run: node --test tests/infra/*.test.js

  # ---------------------------------------------------------------------------
  # Job 2：後端服務測試擋關（新增）
  #
  # 為什麼要這個 job？
  #   先前 wallet-service 因 KafkaConsumerConfig 重複 @Bean 而「無法啟動」的 bug
  #   被合併進了 develop，正是因為 CI 從未跑過後端 Maven 測試。
  #   各服務的 @SpringBootTest（contextLoads）會實際載入整個 Spring context，
  #   能在合併前就攔截「服務根本起不來」這類設定錯誤。
  #
  # 不需外部資料庫/Kafka：全部服務的測試皆使用 H2 記憶體資料庫（見各自
  #   src/test/resources/application.yml）；Kafka 不用內嵌 broker——game 無
  #   @KafkaListener（producer 延遲連線，contextLoads 不碰網路），rank/notification
  #   測試設 spring.kafka.listener.auto-startup=false，事件邏輯測試 mock
  #   KafkaTemplate。所以 CI 不必啟動 PostgreSQL/MySQL/Kafka。
  #
  # 範圍：七個服務全部已實作且測試綠燈（見 CHANGELOG 2026-07-01 健檢紀錄），
  #   全部納入擋關清單。
  # ---------------------------------------------------------------------------
  backend-test:
    name: 後端服務測試
    runs-on: ubuntu-latest

    # contextLoads 需要「必填、無預設值」的環境變數（否則 Spring 啟動即失敗）。
    # 密鑰類變數改在下方 step 於每次 run 內即時生成（見「產生本次 run 專用測試密鑰」），
    # 這裡只留非密鑰設定。
    env:
      CORS_ALLOWED_ORIGINS: http://localhost:5173

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      # 為什麼不用 GitHub Secrets？本專案走 fork/PR 工作流，fork 來的 PR 拿不到
      # repo secrets，一用 CI 就直接紅。測試密鑰只活在單一 run 內、不需持久，
      # 每次 run 隨機生成即可（也順便保證沒有任何寫死在 repo 裡的可用密鑰）。
      - name: 產生本次 run 專用測試密鑰
        run: |
          {
            echo "JWT_SECRET=$(openssl rand -base64 48)"
            internal_secret="$(openssl rand -base64 32)"
            echo "INTERNAL_SECRET=${internal_secret}"
            echo "INTERNAL_SERVICE_SECRET=${internal_secret}"
          } >> "$GITHUB_ENV"

      - name: 安裝 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven   # 快取 ~/.m2，加速後續執行

      - name: 執行後端測試（gateway / member / wallet / admin / game / rank / notification）
        run: >-
          mvn -B -ntp
          -pl backend/gateway-service,backend/member-service,backend/wallet-service,backend/admin-service,backend/game-service,backend/rank-service,backend/notification-service
          clean test

      # ADR-007：wallet-service 真實資料庫（Testcontainers）測試。
      # 上面的 H2 測試驗證「服務起得來、邏輯正確」；這一步用真 postgres:16 + mysql:8.4
      # 套 database/ 真 schema + ddl-auto=validate，攔截 entity↔schema 漂移、
      # CHECK 約束與樂觀鎖等 H2 測不到的問題。ubuntu-latest 內建 Docker，免額外服務設定。
      - name: 執行 wallet-service 真實資料庫測試（Testcontainers）
        run: mvn -B -ntp -pl backend/wallet-service test -Pcontainers-test

  # ---------------------------------------------------------------------------
  # Job 3: frontend quality gate (lint / unit / build / browser smoke)
  # ---------------------------------------------------------------------------
  frontend-test:
    name: Frontend quality gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Vitest
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke
        run: npm run e2e
