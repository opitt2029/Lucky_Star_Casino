<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">彩金魚王</title>
  <desc id="desc">A huge colorful jackpot fish king with rainbow scales, jeweled crown, neon fins, star coins, and prismatic casino glow.</desc>
  <defs>
